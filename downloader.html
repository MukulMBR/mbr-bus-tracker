<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBR Video Downloader</title>
  <link rel="stylesheet" href="hub.css?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    .download-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .download-panel {
      width: min(720px, 100%);
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(18, 20, 28, 0.82);
      backdrop-filter: blur(18px);
      padding: 28px;
    }

    .download-panel h1 {
      font-size: clamp(2rem, 6vw, 4.6rem);
      margin-bottom: 16px;
    }

    .download-panel p {
      color: var(--muted);
      line-height: 1.55;
    }

    .download-form {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .download-input {
      flex: 1;
      min-width: 0;
      background: #0c0f16;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      font: inherit;
      outline: none;
    }

    .download-input:focus {
      border-color: var(--blue);
    }

    .download-button,
    .back-button {
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .download-button {
      background: var(--blue);
      color: #06101f;
    }

    .back-button {
      display: inline-flex;
      margin-top: 18px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .download-log {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
      min-height: 24px;
    }

    @media (max-width: 680px) {
      .download-form {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <main class="download-shell">
    <section class="download-panel">
      <p class="eyebrow">Media Capture</p>
      <h1>Video Downloader</h1>
      <p>Paste a public video URL from a supported platform. The server will stream the file as <strong>downloaded_video.mp4</strong>.</p>
      <form class="download-form" id="downloadForm">
        <input class="download-input" id="downloadUrl" type="url" placeholder="Paste video URL..." required>
        <button class="download-button" type="submit">Download</button>
      </form>
      <div class="download-log" id="downloadLog"></div>
      <a class="back-button" href="/editor">Back to hub</a>
    </section>
  </main>

  <script>
    const form = document.getElementById('downloadForm');
    const input = document.getElementById('downloadUrl');
    const log = document.getElementById('downloadLog');

    form.addEventListener('submit', event => {
      event.preventDefault();
      const url = input.value.trim();
      if (!url) return;
      log.textContent = 'Starting download...';
      window.location.href = `/api/download-video?url=${encodeURIComponent(url)}`;
      setTimeout(() => {
        log.textContent = 'If the download did not begin, check that the link is public and supported.';
      }, 5000);
    });
  </script>
</body>

</html>
